<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tech Pro</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#d60db1,#7deb78);
    font-family:Arial,sans-serif;
}

.calculator{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:20px;
    width:350px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h2{
    color:white;
    text-align:center;
}

#display{
    width:100%;
    height:70px;
    font-size:30px;
    text-align:right;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    padding:10px;
    box-sizing:border-box;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.num{background:#334155;color:white;}
.op{background:#2563eb;color:white;}
.eq{background:#22c55e;color:white;}
.clear{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="calculator">
    <h2>🧮 Calculator Pro</h2>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="add('(')">(</button>
        <button class="op" onclick="add(')')">)</button>
        <button class="op" onclick="backspace()">⌫</button>

        <button class="num" onclick="add('7')">7</button>
        <button class="num" onclick="add('8')">8</button>
        <button class="num" onclick="add('9')">9</button>
        <button class="op" onclick="add('/')">÷</button>

        <button class="num" onclick="add('4')">4</button>
        <button class="num" onclick="add('5')">5</button>
        <button class="num" onclick="add('6')">6</button>
        <button class="op" onclick="add('*')">×</button>

        <button class="num" onclick="add('1')">1</button>
        <button class="num" onclick="add('2')">2</button>
        <button class="num" onclick="add('3')">3</button>
        <button class="op" onclick="add('-')">−</button>

        <button class="num" onclick="add('0')">0</button>
        <button class="num" onclick="add('.')">.</button>
        <button class="eq" onclick="calculate()">=</button>
        <button class="op" onclick="add('+')">+</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function add(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Fehler";
    }
}
</script>

</body>
</html>
