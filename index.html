<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Pro</title>
<style>
  body { margin:0; padding:0; height:100vh; background:#0a0a0f; font-family:'Syne',sans-serif; overflow:hidden; display:flex; flex-direction:column; }
  .calc-container { flex:1; display:flex; justify-content:center; align-items:center; background:#0a0a0f; }
  .calc { background:#12121a; padding:25px; border-radius:24px; width:380px; box-shadow:0 20px 50px rgba(0,0,0,0.7); border:1px solid #2a2a40; position:relative; }
  h2 { color:#00ff88; text-align:center; margin-bottom:20px; }
  #display { width:100%; height:90px; background:#1a1a26; border:none; border-radius:16px; color:white; font-size:2.5rem; text-align:right; padding:0 20px; margin-bottom:20px; }
  .buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  button { height:70px; border:none; border-radius:16px; font-size:1.6rem; cursor:pointer; transition:all 0.2s; }
  button:hover { transform:scale(1.08); }
  .num { background:#2a2a40; color:white; }
  .op { background:#1e3a5f; color:#00ddff; }
  .eq { background:#00ff88; color:black; font-weight:bold; }
  .clear { background:#ff3366; color:white; }
  .close-btn { position:absolute; top:15px; right:15px; background:#ff3366; color:white; border:none; width:35px; height:35px; border-radius:50%; font-size:20px; cursor:pointer; }

  #iframe-container {
    position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; display:none; flex-direction:column;
  }
  .iframe-header {
    padding:12px 20px; background:#111; display:flex; justify-content:space-between; align-items:center; color:white;
  }
  #main-iframe { flex:1; border:none; width:100%; }
</style>
</head>
<body>

<!-- Taschenrechner -->
<div class="calc-container">
  <div class="calc">
    <button class="close-btn" onclick="closeAll()">×</button>
    <h2>🧮 Calculator Pro</h2>
    <input type="text" id="display" readonly>
    
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="op" onclick="add('(')">(</button>
      <button class="op" onclick="add(')')">)</button>
      <button class="op" onclick="backspace()">⌫</button>
      
      <button class="num" onclick="add('7')">7</button>
      <button class="num" onclick="add('8')">8</button>
      <button class="num" onclick="add('9')">9</button>
      <button class="op" onclick="add('/')">÷</button>
      
      <button class="num" onclick="add('4')">4</button>
      <button class="num" onclick="add('5')">5</button>
      <button class="num" onclick="add('6')">6</button>
      <button class="op" onclick="add('*')">×</button>
      
      <button class="num" onclick="add('1')">1</button>
      <button class="num" onclick="add('2')">2</button>
      <button class="num" onclick="add('3')">3</button>
      <button class="op" onclick="add('-')">−</button>
      
      <button class="num" onclick="add('0')">0</button>
      <button class="num" onclick="add('.')">.</button>
      <button class="op" onclick="add('+')">+</button>
      <button class="eq" onclick="calculate()">=</button>
    </div>
  </div>
</div>

<!-- Iframe -->
<div id="iframe-container">
  <div class="iframe-header">
    <span id="iframe-title">Chat</span>
    <button onclick="closeIframe()" style="background:#ff3366; color:white; border:none; padding:8px 16px; border-radius:8px;">Schließen ✕</button>
  </div>
  <iframe id="main-iframe" src=""></iframe>
</div>

<script>
const display = document.getElementById("display");

function add(val) { display.value += val; }
function clearDisplay() { display.value = ""; }
function backspace() { display.value = display.value.slice(0, -1); }

function calculate() {
  const expr = display.value.trim();
  
  if (expr === "4562252428") {
    openIframe("https://jsg1049294-png.github.io/Chat/", "Chat");
    display.value = "Chat wird geöffnet...";
    setTimeout(() => display.value = "", 1500);
    return;
  }
  
  if (expr === "3643637") {
    openIframe("https://jsg1049294-png.github.io/Chat-TestExp/", "TheGame");
    display.value = "TheGame wird geöffnet...";
    setTimeout(() => display.value = "", 1500);
    return;
  }
  
  try {
    let result = eval(expr.replace(/×/g, '*').replace(/÷/g, '/'));
    display.value = result;
  } catch(e) {
    display.value = "Fehler";
    setTimeout(() => display.value = "", 1500);
  }
}

function openIframe(url, title) {
  document.getElementById("iframe-title").textContent = title;
  document.getElementById("main-iframe").src = url;
  document.getElementById("iframe-container").style.display = "flex";
}

function closeIframe() {
  document.getElementById("iframe-container").style.display = "none";
  document.getElementById("main-iframe").src = "";
}

function closeAll() {
  if (confirm("Wirklich schließen?")) window.close();
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") calculate();
  if (e.key === "Escape") closeIframe();
});
</script>
</body>
</html>
