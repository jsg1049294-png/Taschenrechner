<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GlobalChat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --accent: #00ff88; --accent2: #ff3366;
    --text: #e8e8f0; --border: #2a2a40;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
  
  .chat-screen { display:flex; flex-direction:column; height:100vh; }
  .chat-header { background:var(--surface); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
  .messages-container {
    flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px;
    background:var(--bg); max-width:680px; margin:0 auto; width:100%; scroll-behavior:smooth;
  }
  .msg { max-width:82%; }
  .msg.own { align-self:flex-end; }
  .msg.other { align-self:flex-start; }
  .msg-bubble {
    padding:13px 17px; border-radius:18px; font-size:15.5px; line-height:1.45; word-break:break-word;
  }
  .msg.other .msg-bubble { background:var(--surface2); border:1px solid var(--border); border-bottom-left-radius:6px; }
  .msg.own .msg-bubble { background:linear-gradient(135deg,#1a3a2a,#0f2a1a); border:1px solid rgba(0,255,136,0.4); border-bottom-right-radius:6px; }
  
  .chat-input-area {
    background:var(--surface); border-top:1px solid var(--border); padding:12px 16px;
    display:flex; gap:10px; max-width:680px; margin:0 auto; width:100%;
  }
  .chat-input {
    flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:16px;
    color:var(--text); padding:14px 18px; font-size:16px; resize:none; max-height:160px;
  }
  .send-btn {
    background:var(--accent); color:#000; width:52px; height:52px; border-radius:16px; font-size:22px;
  }

  #iframe-container {
    position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:100; display:none; flex-direction:column;
  }
  .iframe-header {
    padding:12px 16px; background:#111; display:flex; justify-content:space-between; align-items:center;
  }
  #main-iframe { flex:1; border:none; width:100%; }
</style>
</head>
<body>

<div class="chat-screen" id="chat-screen">
  <div class="chat-header">
    <div><strong>GlobalChat</strong> <span style="color:#00ff88">● Live</span></div>
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="display-user"></span>
      <button onclick="logout()" style="background:#222; border:none; color:#aaa; padding:6px 12px; border-radius:8px; font-size:13px;">Abmelden</button>
      <button id="admin-clear" onclick="confirmClearAll()" style="display:none; background:#ff3366; color:white; border:none; padding:6px 12px; border-radius:8px; font-size:13px;">Alles löschen</button>
    </div>
  </div>
  <div class="messages-container" id="messages"></div>
  <div class="chat-input-area">
    <textarea id="chat-input" class="chat-input" placeholder="Nachricht... (/my | /sr 1-7 | /ki | /calc)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Iframe Overlay -->
<div id="iframe-container">
  <div class="iframe-header">
    <span id="iframe-title">GlobalChat</span>
    <button onclick="closeIframe()" style="background:#ff3366; color:white; border:none; padding:8px 16px; border-radius:8px;">Schließen ✕</button>
  </div>
  <iframe id="main-iframe" src=""></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
// === Firebase Config ===
const firebaseConfig = {
  apiKey: "AIzaSyBYcwvQazKQxBQjdWqn4wLY-3SA3A4scng",
  authDomain: "globalchat-2026.firebaseapp.com",
  projectId: "globalchat-2026",
  storageBucket: "globalchat-2026.firebasestorage.app",
  messagingSenderId: "510911567824",
  appId: "1:510911567824:web:d95c7e0c5a88501fa3cbd5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let currentUser = "", isAdmin = false;

// YouTube Videos
const youtubeVideos = {
  1: { id: "q7c05ejJ6Sw", title: "Video 1" },
  2: { id: "dQw4w9wgxcq", title: "Rick Astley" },
  3: { id: "zG9nSL2jbyw", title: "Video 3" },
  4: { id: "VqPgrNYPHU8", title: "Video 4" },
  5: { id: "_i6rYe4HLPw", title: "Video 5" },
  6: { id: "o_4PPHaDum4", title: "AURA" },
  7: { id: "oddleN98bgE", title: "herr schlott" }
};

window.onload = () => {
    let attempts = 0;
    function askForPin() {
        const pin = prompt("PIN eingeben:");
        if (!pin) { location.reload(); return; }
        
        if (pin === "6969") {
            currentUser = prompt("Dein Name:") || "User" + Math.floor(Math.random()*1000);
            document.getElementById("display-user").textContent = currentUser;
            initChat();
        } else if (pin === "6214" || pin === "4000") {
            isAdmin = true;
            currentUser = "Admin";
            document.getElementById("display-user").textContent = "👑 Admin";
            document.getElementById("admin-clear").style.display = "block";
            initChat();
        } else {
            attempts++;
            if (attempts >= 3) {
                alert("Zu viele falsche Versuche.");
                location.reload();
            } else {
                alert(`Falscher PIN! Versuch ${attempts}/3`);
                askForPin();
            }
        }
    }
    askForPin();
};

async function initChat() {
  db.collection("messages").orderBy("time", "asc").onSnapshot(snap => {
    const container = document.getElementById("messages");
    container.innerHTML = "";
    snap.forEach(doc => {
      const m = doc.data();
      const div = document.createElement("div");
      div.className = `msg ${m.user === currentUser ? "own" : "other"}`;
      const time = new Date(m.time).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
      div.innerHTML = `<div style="font-size:12.5px; opacity:0.75; margin-bottom:4px;">${m.user} • ${time}</div><div class="msg-bubble">${m.text}</div>`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  });
}

async function sendMessage() {
  const input = document.getElementById("chat-input");
  let text = input.value.trim();
  if (!text) return;
  const lower = text.toLowerCase().trim();

  if (lower === "/my") {
    openIframe("https://www.myinstants.com/de/index/de/", "My Instants");
    input.value = ""; return;
  }
  if (lower.startsWith("/sr")) {
    const parts = text.split(/\s+/);
    let num = 1;
    if (parts.length > 1 && !isNaN(parseInt(parts[1]))) num = parseInt(parts[1]);
    const video = youtubeVideos[num] || youtubeVideos[1];
    openIframe(`https://www.youtube.com/embed/${video.id}?autoplay=1&rel=0`, video.title);
    input.value = ""; return;
  }
  if (lower === "/ki") {
    openIframe("ki.html", "KI Assistant");
    input.value = ""; return;
  }
  if (lower === "/calc") {
    openIframe("calculator.html", "🧮 Calculator Pro");
    input.value = ""; return;
  }

  // Normale Nachricht
  await db.collection("messages").add({
    user: currentUser,
    text: text,
    time: Date.now()
  });
  input.value = "";
}

function openIframe(url, title) {
  document.getElementById("iframe-title").textContent = title;
  document.getElementById("main-iframe").src = url;
  document.getElementById("iframe-container").style.display = "flex";
}

function closeIframe() {
  document.getElementById("iframe-container").style.display = "none";
  document.getElementById("main-iframe").src = "";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function logout() { location.reload(); }
function confirmClearAll() {
  if (confirm("Wirklich ALLE Nachrichten löschen?")) {
    db.collection("messages").get().then(s => s.forEach(d => d.ref.delete()));
  }
}

// === WICHTIG: Listener für den Calculator ===
window.addEventListener("message", (event) => {
  if (event.data.action === "openGlobalChat") {
    closeIframe();
    setTimeout(() => location.reload(), 500);
  }
});
</script>
</body>
</html>
